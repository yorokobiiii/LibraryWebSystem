services:
  library-web:
    build: .
    container_name: LibraryWebSystem
    ports:
      - "5027:8080"  
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      # Сохраняем базу данных, чтобы она не терялась при перезапуске
      - library-db-data:/app/Data
    restart: unless-stopped

volumes:
  library-db-data: